

services:
  fastapi:
    build: .
    container_name: langchain-fastapi
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # 데이터베이스 설정 (Neon PostgreSQL 사용)
      - DATABASE_URL=${DATABASE_URL}
      - POSTGRES_HOST=${POSTGRES_HOST:-ep-blue-bonus-a1zf9qhw-pooler.ap-southeast-1.aws.neon.tech}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_USER=${POSTGRES_USER:-neondb_owner}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-neondb}
      - POSTGRES_SSLMODE=${POSTGRES_SSLMODE:-require}

      # Gemini API 설정
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}

      # QLoRA 설정 (CPU 배포시 false 권장)
      - USE_QLORA=${USE_QLORA:-false}
      - QLORA_MODEL_NAME=${QLORA_MODEL_NAME:-K-intelligence/Midm-2.0-Mini-Instruct}

      # GPU/CUDA 설정
      - MODEL_DEVICE=${MODEL_DEVICE:-cuda}  # cuda로 강제 설정 (CPU가 아닌 경우)
      - MODEL_DTYPE=${MODEL_DTYPE:-float16}

      # 앱 설정
      - APP_TITLE=${APP_TITLE:-LangChain Chatbot API}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    volumes:
      # 애플리케이션 코드 마운트 (개발 중 코드 변경사항 즉시 반영)
      - ./app:/app/app
      - ./config.py:/app/config.py
      - ./artifacts:/app/artifacts
      # 모델 체크포인트 영속성 보장
      - ./models:/app/models
      - ./static:/app/static
      # 용어사전 데이터 파일 영속성 보장
      - ./data:/app/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - langchain-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 선택사항: Nginx 리버스 프록시
