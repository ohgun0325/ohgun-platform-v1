[alembic]
# Run from app dir: cd app. Relative path avoids encoding issues.
script_location = alembic
prepend_sys_path = .
sqlalchemy.url = postgresql://neondb_owner:npg_1yNpvxl5fRnK@ep-dark-violet-a1dtvvt8-pooler.ap-southeast-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
